<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maison de la Roue · Jeux</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,700;0,900;1,700;1,900&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060a;--bg-2:#0e0a14;--ink:#f5ead0;--ink-dim:#a99e86;--gold:#d4af37;--gold-bright:#f0cc5a;--red:#b6122a;--line:rgba(212,175,55,.25);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:"Bodoni Moda",serif;overflow:hidden;}
body{background:radial-gradient(1400px 700px at 50% -20%,rgba(212,175,55,.14),transparent 70%),radial-gradient(1000px 600px at 100% 120%,rgba(182,18,42,.18),transparent 70%),var(--bg);}
.top{position:absolute;top:0;left:0;right:0;padding:22px 40px;display:flex;justify-content:space-between;align-items:center;z-index:5;padding-right:160px;}
.brand{font-weight:900;font-style:italic;font-size:34px;background:linear-gradient(180deg,var(--gold-bright),var(--gold) 60%,#8a6e1c);-webkit-background-clip:text;background-clip:text;color:transparent;}
.brand small{display:block;font-family:"JetBrains Mono",monospace;font-style:normal;font-weight:600;font-size:11px;letter-spacing:.4em;color:var(--ink-dim);margin-top:4px;}
.badge{font-family:"JetBrains Mono",monospace;font-weight:800;font-size:12px;letter-spacing:.4em;text-transform:uppercase;padding:10px 18px;border-radius:4px;border:1px solid var(--line);color:var(--gold);background:rgba(0,0,0,.3);}
.stage{position:absolute;inset:0;display:grid;grid-template-columns:1fr 320px;padding-top:90px;}
.board{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.side{padding:20px 30px 30px 0;display:flex;flex-direction:column;gap:14px;overflow:hidden;}
.panel{background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(0,0,0,.3)),var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
.section{font-family:"JetBrains Mono",monospace;font-weight:800;font-size:11px;letter-spacing:.4em;color:var(--ink-dim);margin-bottom:10px;text-transform:uppercase;}
.idle-hint{font-style:italic;font-size:28px;color:var(--ink-dim);text-align:center;}
.title{font-style:italic;font-size:48px;font-weight:900;color:var(--gold-bright);text-shadow:0 0 30px rgba(240,204,90,.4);margin-bottom:30px;}

/* SLOT */
.slot-frame{background:linear-gradient(180deg,#1a1208,#0a0604);border:3px solid var(--gold);border-radius:18px;padding:30px;box-shadow:0 0 60px rgba(212,175,55,.25),inset 0 0 30px rgba(0,0,0,.5);}
.reels{display:flex;gap:14px;}
.reel{width:160px;height:200px;background:#fff;border-radius:10px;overflow:hidden;position:relative;box-shadow:inset 0 0 30px rgba(0,0,0,.3);}
.reel-strip{position:absolute;left:0;right:0;display:flex;flex-direction:column;align-items:center;font-size:120px;line-height:200px;}
.reel.spinning .reel-strip{animation:reelspin 0.08s linear infinite;}
@keyframes reelspin{from{transform:translateY(0);}to{transform:translateY(-200px);}}

/* LUCKY */
.lucky-box{text-align:center;}
.lucky-target{font-size:200px;font-weight:900;font-style:italic;color:var(--gold-bright);text-shadow:0 0 50px rgba(240,204,90,.6);line-height:1;}
.lucky-target.hidden{filter:blur(40px);color:var(--ink-dim);}
.lucky-q{font-size:80px;color:var(--ink-dim);}
.guess-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:30px;max-width:800px;}
.guess-card{padding:10px 8px;background:rgba(212,175,55,.08);border:1px solid var(--line);border-radius:8px;text-align:center;}
.guess-card.winner{background:linear-gradient(180deg,#d4af37,#7a5825);color:#0a0604;border-color:var(--gold-bright);}
.guess-name{font-size:12px;font-family:"JetBrains Mono",monospace;font-weight:600;color:var(--ink);}
.guess-num{font-size:32px;font-weight:900;font-style:italic;}

/* WAR */
.war-cards{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;}
.card{width:140px;height:200px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:"Bodoni Moda",serif;position:relative;box-shadow:0 10px 30px rgba(0,0,0,.5);transform:rotateY(180deg);transition:transform .8s;}
.card.flipped{transform:rotateY(0);}
.card.red{color:#b6122a;}
.card.black{color:#0a0604;}
.card.winner{box-shadow:0 0 50px var(--gold-bright),0 10px 30px rgba(0,0,0,.5);transform:rotateY(0) scale(1.1);border:3px solid var(--gold-bright);}
.card-rank{font-size:64px;font-weight:900;}
.card-suit{font-size:48px;}
.card-back{position:absolute;inset:0;background:repeating-linear-gradient(45deg,#7a1020,#7a1020 10px,#5a0815 10px,#5a0815 20px);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:40px;font-style:italic;font-weight:900;transform:rotateY(180deg);backface-visibility:hidden;}
.card.flipped .card-back{display:none;}
.war-player{text-align:center;}
.war-name{font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.2em;color:var(--ink-dim);margin-top:8px;text-transform:uppercase;}

/* HORSE RACE */
.race-track{width:100%;max-width:900px;background:linear-gradient(180deg,#2a4a2a 0%,#1a3a1a 100%);border:3px solid var(--gold);border-radius:14px;padding:18px;box-shadow:0 0 40px rgba(212,175,55,.2),inset 0 0 30px rgba(0,0,0,.5);}
.lane{display:flex;align-items:center;gap:10px;margin:8px 0;position:relative;height:40px;background:rgba(0,0,0,.25);border-radius:6px;overflow:hidden;}
.lane-label{font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:800;letter-spacing:.15em;color:var(--ink);min-width:120px;padding:0 12px;z-index:2;}
.horse-marker{position:absolute;top:50%;transform:translateY(-50%);font-size:30px;transition:left .35s cubic-bezier(.4,.05,.4,1);z-index:3;filter:drop-shadow(0 4px 6px rgba(0,0,0,.5));}
.finish-line{position:absolute;right:8px;top:0;bottom:0;width:6px;background:repeating-linear-gradient(0deg,#fff 0,#fff 8px,#000 8px,#000 16px);z-index:1;}
.lane.winner{background:linear-gradient(90deg,rgba(212,175,55,.25),rgba(212,175,55,.05));box-shadow:0 0 25px rgba(212,175,55,.4);border:1px solid var(--gold);}

/* POT + bets */
.pot{font-size:60px;font-style:italic;font-weight:900;color:var(--gold-bright);text-align:center;margin-top:20px;}
.pot-label{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.4em;color:var(--ink-dim);text-transform:uppercase;text-align:center;}
.bet-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:1px dotted rgba(212,175,55,.1);}
.bet-row:last-child{border:none;}
.qr-mini{text-align:center;padding:10px;}
.qr-mini canvas{background:#fff;border-radius:4px;width:120px;height:120px;}

.result-overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.85);z-index:50;backdrop-filter:blur(8px);}
.result-overlay.show{display:flex;}
.result-title{font-size:90px;font-weight:900;font-style:italic;color:var(--gold-bright);text-shadow:0 0 60px rgba(240,204,90,.7);}
.result-sub{font-size:24px;color:var(--ink);margin-top:20px;}
</style>
</head>
<body>
<div class="top">
  <div class="brand">Maison de la Roue<small>SALLE DES JEUX</small></div>
  <div class="badge" id="badge">EN ATTENTE</div>
</div>

<div class="stage">
  <div class="board" id="board">
    <div class="idle-hint" data-i18n="games.idle">L'hôte démarrera bientôt un jeu…</div>
  </div>
  <aside class="side">
    <div class="panel">
      <div class="section" data-i18n="games.pot">CAGNOTTE</div>
      <div class="pot" id="pot">0</div>
      <div class="pot-label" data-i18n="games.chips">jetons</div>
    </div>
    <div class="panel" style="flex:1;min-height:0;overflow:auto">
      <div class="section" data-i18n="games.bets">MISES</div>
      <div id="bets-list"><div style="color:var(--ink-dim);font-style:italic">—</div></div>
    </div>
    <div class="panel qr-mini">
      <div class="section" data-i18n="disp.join">REJOINDRE</div>
      <canvas id="qr"></canvas>
    </div>
  </aside>
</div>

<div class="result-overlay" id="result-overlay">
  <div class="result-title" id="result-title">—</div>
  <div class="result-sub" id="result-sub"></div>
</div>

<script src="/qr.js"></script>
<script src="/i18n.js"></script>
<script src="/lang-switcher.js"></script>
<script>
I18N.init();
let ws, state = null;
const esc = s => String(s||'').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'})[c]);

function connect() {
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(proto+'://'+location.host);
  ws.onopen = () => {
    ws.send(JSON.stringify({type:'mini-display-hello'}));
    try { QR.draw(document.getElementById('qr'), location.origin + '/phone', {scale:4, margin:2}); } catch(e){}
  };
  ws.onclose = () => setTimeout(connect, 1200);
  ws.onmessage = e => {
    const m = JSON.parse(e.data);
    if (m.type === 'mini-state') render(m);
  };
}
connect();

function render(s) {
  state = s;
  // Badge
  const badge = document.getElementById('badge');
  const modeLbl = { idle:t('games.idle_badge'), slot:'🎰 SLOT', lucky:'🎯 LUCKY', war:'⚔️ WAR' }[s.mode] || '—';
  const phaseLbl = { betting:t('games.betting'), playing:t('games.spinning'), result:t('games.result'), idle:'' }[s.phase] || '';
  badge.textContent = modeLbl + (phaseLbl?' · '+phaseLbl:'');

  // Pot
  document.getElementById('pot').textContent = (s.pot||0).toLocaleString();

  // Bets list
  const bl = document.getElementById('bets-list');
  const entries = Object.entries(s.bets || {});
  if (!entries.length) bl.innerHTML = '<div style="color:var(--ink-dim);font-style:italic">—</div>';
  else bl.innerHTML = entries.map(([id, b]) => {
    const p = s.players[id]; if (!p) return '';
    const pickLbl = b.pick != null ? ` <b>#${b.pick}</b>` : '';
    return `<div class="bet-row"><span>${p.avatar||'🎩'} ${esc(p.name)}${pickLbl}</span><span style="color:var(--gold)">${b.amount}</span></div>`;
  }).join('');

  // Board
  const board = document.getElementById('board');
  if (s.mode === 'idle') {
    board.innerHTML = '<div class="idle-hint">' + t('games.idle') + '</div>';
  } else if (s.mode === 'slot') {
    renderSlot(board, s);
  } else if (s.mode === 'lucky') {
    renderLucky(board, s);
  } else if (s.mode === 'war') {
    renderWar(board, s);
  } else if (s.mode === 'horse') {
    renderHorse(board, s);
  }

  // Result overlay
  const ov = document.getElementById('result-overlay');
  if (s.phase === 'result' && s.result) {
    showResult(s);
    setTimeout(()=>ov.classList.remove('show'), 6000);
  } else {
    ov.classList.remove('show');
  }
}

function renderSlot(board, s) {
  const isSpinning = s.phase === 'playing' && !s.slotReels;
  const reels = s.slotReels || ['🎰','🎰','🎰'];
  board.innerHTML = `
    <div class="title">🎰 ${t('games.slot.title')}</div>
    <div class="slot-frame">
      <div class="reels">
        <div class="reel ${isSpinning?'spinning':''}"><div class="reel-strip">${reels[0]}</div></div>
        <div class="reel ${isSpinning?'spinning':''}"><div class="reel-strip">${reels[1]}</div></div>
        <div class="reel ${isSpinning?'spinning':''}"><div class="reel-strip">${reels[2]}</div></div>
      </div>
    </div>
  `;
}

function renderLucky(board, s) {
  const target = (s.phase === 'result' || s.phase === 'playing') ? s.luckyTarget : null;
  const entries = Object.entries(s.bets||{});
  const winnerIds = (s.result && s.result.winners) || [];
  board.innerHTML = `
    <div class="title">🎯 ${t('games.lucky.title')}</div>
    <div class="lucky-box">
      <div class="${target?'lucky-target':'lucky-target hidden lucky-q'}">${target ? target : '?'}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.4em;color:var(--ink-dim);margin-top:14px">${t('games.lucky.target')}</div>
    </div>
    <div class="guess-grid">
      ${entries.map(([id,b]) => {
        const p = s.players[id]; if (!p) return '';
        const isWin = winnerIds.includes(id);
        return `<div class="guess-card ${isWin?'winner':''}"><div class="guess-name">${p.avatar||''} ${esc(p.name)}</div><div class="guess-num">${b.pick ?? '—'}</div></div>`;
      }).join('')}
    </div>
  `;
}

function renderWar(board, s) {
  const cards = s.warCards || {};
  const ids = Object.keys(s.bets || {});
  const winners = s.warWinnerIds || [];
  const reveal = s.phase === 'playing' || s.phase === 'result';
  board.innerHTML = `
    <div class="title">⚔️ ${t('games.war.title')}</div>
    <div class="war-cards">
      ${ids.map(id => {
        const p = s.players[id]; if (!p) return '';
        const c = cards[id];
        const flipped = reveal && c;
        const red = c && (c.suit==='♥'||c.suit==='♦');
        const win = winners.includes(id);
        return `<div class="war-player">
          <div class="card ${flipped?'flipped':''} ${red?'red':'black'} ${win?'winner':''}">
            ${c?`<div class="card-rank">${c.rank}</div><div class="card-suit">${c.suit}</div>`:''}
            <div class="card-back">M</div>
          </div>
          <div class="war-name">${p.avatar||''} ${esc(p.name)}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function renderHorse(board, s) {
  const horses = s.horses || [];
  const positions = s.horsePositions || {};
  const trackLen = s.horseTrackLen || 30;
  const winner = s.horseWinner;
  // Count bets per horse
  const horseBets = {};
  for (const [pid, bet] of Object.entries(s.bets||{})) {
    horseBets[bet.pick] = (horseBets[bet.pick]||0) + bet.amount;
  }
  board.innerHTML = `
    <div class="title">🐎 ${t('games.horse.title')}</div>
    <div class="race-track">
      ${horses.map(h => {
        const pos = positions[h.id] || 0;
        const pct = Math.min(100, (pos/trackLen)*100);
        const isWin = winner === h.id;
        const staked = horseBets[h.id] || 0;
        return `<div class="lane ${isWin?'winner':''}">
          <div class="lane-label" style="color:${h.color}">${h.emoji} ${esc(h.name)}${staked?` <span style="opacity:.6;font-weight:400">· ${staked}</span>`:''}</div>
          <div class="finish-line"></div>
          <div class="horse-marker" style="left:calc(${pct}% - 30px)">${h.emoji}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function showResult(s) {
  const ov = document.getElementById('result-overlay');
  const ttl = document.getElementById('result-title');
  const sub = document.getElementById('result-sub');
  if (s.mode === 'slot') {
    const m = s.result.mult;
    ttl.textContent = m >= 3 ? '🎉 JACKPOT!' : m >= 1 ? '✨ ' + t('games.win') : '💨 ' + t('games.miss');
    sub.textContent = s.result.reels.join(' · ') + '   ×' + m;
  } else if (s.mode === 'lucky') {
    const w = s.result.winners||[];
    if (!w.length) { ttl.textContent = t('games.no_winner'); sub.textContent = ''; }
    else {
      const names = w.map(id => (s.players[id]?.name)||'?').join(' & ');
      ttl.textContent = '🏆 ' + names;
      sub.textContent = t('games.target')+': '+s.result.target+' · '+t('games.distance')+': '+s.result.distance;
    }
  } else if (s.mode === 'war') {
    const w = s.result.winners||[];
    const names = w.map(id => (s.players[id]?.name)||'?').join(' & ');
    ttl.textContent = '⚔️ ' + (names || t('games.no_winner'));
    sub.textContent = t('games.takes_pot')+': '+s.pot;
  } else if (s.mode === 'horse') {
    const horse = (s.horses||[]).find(h => h.id === s.result.winnerHorse);
    const w = s.result.winners||[];
    ttl.textContent = '🏆 ' + (horse ? horse.emoji + ' ' + horse.name : '?');
    if (w.length) {
      const names = w.map(id => (s.players[id]?.name)||'?').join(' & ');
      sub.textContent = t('games.winners')+': '+names;
    } else {
      sub.textContent = t('games.no_winner');
    }
    try { SFX.win(); } catch(e){}
  }
  ov.classList.add('show');
}
</script>
</body>
</html>
