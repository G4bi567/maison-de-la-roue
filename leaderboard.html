<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title data-i18n-doctitle="leader.title">Classement · Maison de la Roue</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;0,6..96,900;1,6..96,700;1,6..96,900&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060a;--bg-2:#0e0a14;--ink:#f5ead0;--ink-dim:#a99e86;--gold:#d4af37;--gold-bright:#f0cc5a;--silver:#c0c8d0;--bronze:#cd7f32;--line:rgba(212,175,55,.25);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:"Bodoni Moda",serif;overflow:hidden;}
body{background:radial-gradient(1400px 700px at 50% -20%,rgba(212,175,55,.16),transparent 70%),radial-gradient(1000px 600px at 100% 120%,rgba(182,18,42,.18),transparent 70%),var(--bg);display:flex;flex-direction:column;}
.top{padding:24px 40px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);}
.brand{font-weight:900;font-style:italic;font-size:34px;
  background:linear-gradient(180deg,var(--gold-bright),var(--gold) 60%,#8a6e1c);-webkit-background-clip:text;background-clip:text;color:transparent;}
.brand small{display:block;font-family:"JetBrains Mono",monospace;font-style:normal;font-weight:600;font-size:11px;letter-spacing:.4em;color:var(--ink-dim);margin-top:4px;}
.stats{display:flex;gap:30px;font-family:"JetBrains Mono",monospace;}
.stat{text-align:center;}
.stat-num{font-weight:800;font-size:22px;color:var(--gold-bright);}
.stat-label{font-size:9px;letter-spacing:.3em;color:var(--ink-dim);text-transform:uppercase;margin-top:4px;}
.main{flex:1;display:flex;flex-direction:column;padding:30px 40px 20px;overflow:hidden;}
.podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:30px;height:280px;align-items:end;}
.podium.empty .spot{opacity:.3;}
.spot{border-radius:14px;padding:18px;text-align:center;display:flex;flex-direction:column;justify-content:center;
  background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(0,0,0,.4));border:2px solid var(--line);transition:all .4s;}
.spot.s1{height:280px;border-color:var(--gold);background:linear-gradient(180deg,rgba(212,175,55,.15),rgba(0,0,0,.4));box-shadow:0 0 50px rgba(212,175,55,.2);}
.spot.s2{height:230px;border-color:var(--silver);background:linear-gradient(180deg,rgba(192,200,208,.1),rgba(0,0,0,.4));}
.spot.s3{height:200px;border-color:var(--bronze);background:linear-gradient(180deg,rgba(205,127,50,.1),rgba(0,0,0,.4));}
.spot.flash{animation:flashPodium .8s;}
@keyframes flashPodium{50%{box-shadow:0 0 60px rgba(240,204,90,.5);}}
.spot-medal{font-size:48px;line-height:1;margin-bottom:8px;}
.spot.s1 .spot-medal{font-size:64px;}
.spot-name{font-family:"Bodoni Moda",serif;font-style:italic;font-weight:900;font-size:24px;line-height:1.1;margin-bottom:10px;overflow:hidden;text-overflow:ellipsis;}
.spot.s1 .spot-name{font-size:32px;color:var(--gold-bright);}
.spot-amount{font-family:"JetBrains Mono",monospace;font-weight:800;font-size:34px;color:var(--ink);}
.spot.s1 .spot-amount{font-size:44px;color:var(--gold-bright);}
.spot-count{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.2em;color:var(--ink-dim);text-transform:uppercase;margin-top:6px;}
.others{flex:1;overflow-y:auto;padding-right:10px;}
.others::-webkit-scrollbar{width:6px;}
.others::-webkit-scrollbar-thumb{background:rgba(212,175,55,.3);border-radius:3px;}
.other-row{display:flex;align-items:center;gap:18px;padding:14px 18px;border-radius:10px;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);margin-bottom:8px;transition:all .3s;}
.other-row.flash{background:rgba(212,175,55,.12);border-color:var(--gold);}
.other-rank{font-family:"JetBrains Mono",monospace;font-weight:800;font-size:18px;color:var(--ink-dim);min-width:50px;}
.other-name{flex:1;font-family:"Bodoni Moda",serif;font-style:italic;font-weight:700;font-size:20px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.other-amount{font-family:"JetBrains Mono",monospace;font-weight:800;font-size:24px;color:var(--gold-bright);}
.empty-state{text-align:center;padding:50px 30px;font-style:italic;color:var(--ink-dim);font-size:16px;}
.empty-state .big{font-size:48px;display:block;margin-bottom:14px;}
.connect-hint{text-align:center;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.3em;color:var(--ink-dim);
  padding:14px;border-top:1px solid var(--line);text-transform:uppercase;}
</style></head>
<body>

<div class="top">
  <div class="brand">
    <span data-i18n="leader.title">Classement</span>
    <small data-i18n="leader.subtitle">En direct · Mis à jour automatiquement</small>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-players">0</div><div class="stat-label" data-i18n="leader.players">JOUEURS</div></div>
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label" data-i18n="leader.total_chips">TOTAL DES JETONS</div></div>
  </div>
</div>

<div class="main">
  <div class="podium empty" id="podium">
    <div class="spot s2" id="spot-2"><div class="spot-medal">🥈</div><div class="spot-name">—</div><div class="spot-amount">0</div><div class="spot-count">— jetons</div></div>
    <div class="spot s1" id="spot-1"><div class="spot-medal">🥇</div><div class="spot-name">—</div><div class="spot-amount">0</div><div class="spot-count">— jetons</div></div>
    <div class="spot s3" id="spot-3"><div class="spot-medal">🥉</div><div class="spot-name">—</div><div class="spot-amount">0</div><div class="spot-count">— jetons</div></div>
  </div>
  <div class="others" id="others-list"></div>
</div>

<div class="connect-hint" data-i18n="leader.auto">↻ Mise à jour automatique</div>

<div style="position:fixed;bottom:20px;right:20px;background:rgba(0,0,0,.6);padding:10px;border-radius:8px;border:1px solid rgba(212,175,55,.3);text-align:center;z-index:10">
  <div style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.3em;color:#a99e86;text-transform:uppercase;margin-bottom:6px" data-i18n="disp.join">Join</div>
  <canvas id="qr" style="display:block;background:#fff;border-radius:4px;width:110px;height:110px"></canvas>
</div>

<script src="/qr.js"></script>
<script src="/i18n.js"></script>
<script src="/lang-switcher.js"></script>
<script>
I18N.init();
try { QR.draw(document.getElementById('qr'), location.origin + '/phone', {scale:4, margin:2}); } catch(e){}

let lastTotals = {};

async function loadLeaderboard() {
  try {
    const res = await fetch('/api/leaderboard');
    if (res.ok) { const d = await res.json(); render(d.leaderboard || []); }
  } catch {}
}
function connect() {
  const ws = new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host);
  ws.onopen = () => ws.send(JSON.stringify({type:'display-hello'}));
  ws.onmessage = e => {
    try {
      const m = JSON.parse(e.data);
      if (m.type === 'leaderboard') render(m.leaderboard || []);
    } catch {}
  };
  ws.onclose = () => setTimeout(connect, 1500);
}
function render(list) {
  document.getElementById('stat-players').textContent = list.length;
  const grandTotal = list.reduce((s,p)=>s+p.total, 0);
  document.getElementById('stat-total').textContent = grandTotal.toLocaleString();
  const podium = document.getElementById('podium');
  if (list.length === 0) podium.classList.add('empty'); else podium.classList.remove('empty');
  updateSpot(1, list[0]); updateSpot(2, list[1]); updateSpot(3, list[2]);
  const others = list.slice(3);
  const ol = document.getElementById('others-list');
  if (list.length === 0) {
    ol.innerHTML = `<div class="empty-state"><span class="big">🎰</span>${t('leader.empty')}<br>
      <span style="font-size:13px;font-family:'JetBrains Mono';letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);">${t('leader.open_vault')}</span></div>`;
  } else if (others.length === 0) {
    ol.innerHTML = `<div class="empty-state" style="padding:30px 20px;font-size:14px;">${t('leader.podium_only')}</div>`;
  } else {
    ol.innerHTML = others.map((p,i)=>{
      const r = i+4;
      const fl = (lastTotals[p.deviceId]!==undefined && lastTotals[p.deviceId]!==p.total)?'flash':'';
      return `<div class="other-row ${fl}">
        <div class="other-rank">${r}.</div>
        <div class="other-name">${escapeHtml(p.name)}</div>
        <div class="other-amount">${p.total.toLocaleString()}</div>
      </div>`;
    }).join('');
  }
  lastTotals = {};
  list.forEach(p => { lastTotals[p.deviceId] = p.total; });
}
function updateSpot(rank, player) {
  const el = document.getElementById('spot-' + rank);
  const nameEl = el.querySelector('.spot-name');
  const amountEl = el.querySelector('.spot-amount');
  const countEl = el.querySelector('.spot-count');
  if (!player) {
    nameEl.textContent = '—'; amountEl.textContent = '0';
    countEl.textContent = '— ' + t('common.chips');
    return;
  }
  const old = lastTotals[player.deviceId];
  nameEl.textContent = player.name;
  amountEl.textContent = player.total.toLocaleString();
  const lbl = player.count === 1 ? t('leader.chip_phys_one') : t('leader.chip_phys');
  countEl.textContent = player.count + ' ' + lbl;
  if (old !== undefined && old !== player.total) {
    el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
  }
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

document.addEventListener('langchange', loadLeaderboard);
loadLeaderboard();
connect();
setInterval(loadLeaderboard, 10000);
</script>
</body>
</html>
